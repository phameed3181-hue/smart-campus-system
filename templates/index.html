<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Campus Ledger Matrix</title>
    <style>
        :root {
            --bg-deep: #0f0f1a;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-neon: rgba(157, 78, 221, 0.3);
            --neon-purple: #9d4edd;
            --neon-cyan: #00f5d4;
            --text-light: #e0e0e6;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-glass);
            border: 1px solid var(--border-neon);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .charts-container { grid-template-columns: 1fr; }
        }

        h2 {
            color: var(--neon-purple);
            margin-top: 0;
            border-bottom: 1px solid var(--border-neon);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-neon);
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--neon-cyan);
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }

        button {
            background: linear-gradient(45deg, var(--neon-purple), #7b2cbf);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-container input {
            flex: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            color: var(--neon-cyan);
            font-weight: 600;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .badge-active { background: rgba(0, 245, 212, 0.2); color: var(--neon-cyan); }
        .badge-inactive { background: rgba(255, 255, 255, 0.1); color: #888; }

        .purge-btn {
            background: rgba(239, 71, 111, 0.2);
            color: #ef476f;
            border: 1px solid #ef476f;
            padding: 5px 10px;
            width: auto;
            border-radius: 4px;
        }

        .purge-btn:hover {
            background: #ef476f;
            color: white;
            box-shadow: 0 0 10px #ef476f;
        }

        .chart-wrapper {
            text-align: center;
        }

        .chart-wrapper img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Aura Campus System Matrix</h1>
        <p>Dual-Pipeline Analytics & Dynamic Record Ledger</p>
    </header>

    <div class="dashboard-grid">
        
        <div class="card">
            <h2>System Record Entry</h2>
            <div class="form-group">
                <label>System Unique UID (Student ID)</label>
                <input type="text" id="studentId" placeholder="e.g., DSCE-01">
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="studentName" placeholder="Hameed Pinjari">
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="studentAge" placeholder="e.g., 19" min="15" max="100">
            </div>
            <div class="form-group">
                <label>Category Classification Tier</label>
                <select id="studentTier">
                    <option value="Regular">Regular (Standard)</option>
                    <option value="Scholar">Scholar (Premium)</option>
                </select>
            </div>
            <div class="checkbox-group">
                <label><input type="checkbox" id="hostelCheck"> Hostel Facility</label>
                <label><input type="checkbox" id="transportCheck"> Transport Grid</label>
            </div>
            <div class="form-group">
                <label>Enrolled Courses (Comma Separated)</label>
                <input type="text" id="studentCourses" placeholder="CAED, C-Programming, Math">
            </div>
            <button onclick="commitStudentRecord()">Initialize Record</button>
        </div>

        <div class="card">
            <h2>Performance Analytics Hub</h2>
            <div class="charts-container">
                <div class="chart-wrapper">
                    <img id="pieChart" src="/static/analytics_pie.png?t=0" alt="Pie Chart">
                </div>
                <div class="chart-wrapper">
                    <img id="barChart" src="/static/analytics_bar.png?t=0" alt="Bar Graph">
                </div>
            </div>
        </div>

        <div class="card full-width">
            <h2>Live Database Ledger Matrix</h2>
            
            <div class="search-container">
                <input type="text" id="idSearchInput" placeholder="Enter precise Student ID to filter matrix ledger instantly..." onkeyup="filterLedgerById()">
            </div>

            <table id="ledgerTable">
                <thead>
                    <tr>
                        <th>UID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Tier</th>
                        <th>Hostel</th>
                        <th>Transport</th>
                        <th>Enrolled Courses</th>
                        <th>Total Fee (₹)</th>
                        <th>Operations</th>
                    </tr>
                </thead>
                <tbody id="ledgerBody">
                    </tbody>
            </table>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', refreshLedgerData);

        function refreshLedgerData() {
            fetch('/api/students')
                .then(res => res.json())
                .then(data => {
                    renderTable(data);
                    const timestamp = new Date().getTime();
                    document.getElementById('pieChart').src = "/static/analytics_pie.png?t=" + timestamp;
                    document.getElementById('barChart').src = "/static/analytics_bar.png?t=" + timestamp;
                });
        }

        function renderTable(students) {
            const tbody = document.getElementById('ledgerBody');
            tbody.innerHTML = '';
            
            students.forEach(s => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="color: var(--neon-cyan); font-weight: bold;">${s.id}</td>
                    <td>${s.name}</td>
                    <td>${s.age || 'N/A'}</td>
                    <td style="color: var(--neon-purple);">${s.tier}</td>
                    <td><span class="badge ${s.hostel === 'Yes' ? 'badge-active' : 'badge-inactive'}">${s.hostel}</span></td>
                    <td><span class="badge ${s.transport === 'Yes' ? 'badge-active' : 'badge-inactive'}">${s.transport}</span></td>
                    <td>${s.courses.join(', ') || 'None'}</td>
                    <td style="font-family: monospace; font-weight: bold;">${s.total_fee.toLocaleString()}</td>
                    <td><button class="purge-btn" onclick="purgeRecord('${s.id}')">Purge</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function commitStudentRecord() {
            const id = document.getElementById('studentId').value.trim();
            const name = document.getElementById('studentName').value.trim();
            const age = document.getElementById('studentAge').value.trim();
            const tier = document.getElementById('studentTier').value;
            const hostel = document.getElementById('hostelCheck').checked ? 'Yes' : 'No';
            const transport = document.getElementById('transportCheck').checked ? 'Yes' : 'No';
            const coursesInput = document.getElementById('studentCourses').value;
            
            const courses = coursesInput.split(',').map(c => c.trim()).filter(c => c.length > 0);

            if(!id || !name || !age) {
                alert("Please fill out ID, Name, and Age variables before initialization.");
                return;
            }

            const payload = { id, name, age, tier, hostel, transport, courses };

            fetch('/api/students', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('studentId').value = '';
                    document.getElementById('studentName').value = '';
                    document.getElementById('studentAge').value = '';
                    document.getElementById('studentCourses').value = '';
                    document.getElementById('hostelCheck').checked = false;
                    document.getElementById('transportCheck').checked = false;
                    refreshLedgerData();
                } else {
                    alert(data.message);
                }
            });
        }

        function purgeRecord(studentId) {
            if(confirm(`Confirm permanent erasure of entry signature: ${studentId}?`)) {
                fetch(`/api/students/${studentId}`, { method: 'DELETE' })
                    .then(res => res.json())
                    .then(() => refreshLedgerData());
            }
        }

        function filterLedgerById() {
            const input = document.getElementById('idSearchInput').value.toUpperCase();
            const table = document.getElementById('ledgerTable');
            const tr = table.getElementsByTagName('tr');

            for (let i = 1; i < tr.length; i++) {
                const td = tr[i].getElementsByTagName('td')[0];
                if (td) {
                    const txtValue = td.textContent || td.innerText;
                    if (txtValue.toUpperCase().indexOf(input) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }
            }
        }
    </script>
</body>
</html>
